<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil de Trabajador</title>
    <style>
        body { background-color: #0a0f1c; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        #bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0f1c; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        
        /* Ajuste para que se vea igual al original */
        .card { background-color: #1a2235; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #10b981; }
        .card.vencido { border-left-color: #b91c1c; }
        .card.por-vencer { border-left-color: #d97706; }
        .status { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #064e3b; color: #10b981; }
        .status.vencido { background: #7f1d1d; color: #ef4444; }
        .status.por-vencer { background: #78350f; color: #d97706; }
        
        /* Botón original */
        .btn-original { 
            width: 100%; padding: 15px; border-radius: 8px; border: none; 
            background: #f3f4f6; color: #a0b2c6; font-weight: bold; cursor: pointer; margin-top: 20px; 
        }
    </style>
</head>
<body>

<div id="bloqueo">
    <h1>Acceso Restringido</h1>
    <input type="password" id="pin" maxlength="4" placeholder="••••" style="padding:15px; border-radius:8px; border:none; text-align:center; font-size:20px; background:#1a2538; color:white; margin:20px;">
    <button onclick="validar()">Desbloquear Perfil</button>
</div>

<div id="contenido" style="display:none;">
    <!-- Aquí mantienes tu estructura original de foto, RUT, SAP, etc. -->
    <div id="lista-competencias"></div>
    <button class="btn-original" onclick="location.reload()">Cerrar Perfil</button>
</div>

<script>
    const comps = [
        { nombre: "Examen Ocupacional", fecha: "2026-12-15" },
        { nombre: "Licencia Interna", fecha: "2025-05-20" },
        { nombre: "Trabajo en Altura", fecha: "2027-03-10" },
        { nombre: "Uso de Extintores", fecha: "2026-08-01" },
        { nombre: "Izaje / Rigger", fecha: "2025-09-12" }
    ];

    function validar() {
        if(document.getElementById('pin').value === "1234") {
            document.getElementById('bloqueo').style.display = 'none';
            document.getElementById('contenido').style.display = 'block';
            renderizar();
        } else { alert("Clave incorrecta"); }
    }

    function renderizar() {
        const hoy = new Date(); hoy.setHours(0,0,0,0);
        let container = document.getElementById('lista-competencias');
        
        comps.forEach(c => {
            let f = new Date(c.fecha);
            let dias = Math.ceil((f - hoy) / (1000 * 60 * 60 * 24));
            
            let cl = "", st = "VIGENTE";
            if (dias < 0) { cl = "vencido"; st = "VENCIDO"; }
            else if (dias <= 30) { cl = "por-vencer"; st = "POR VENCER"; }
            
            container.innerHTML += `
                <div class="card ${cl}">
                    <div>
                        <div style="font-weight:bold; font-size:15px;">${c.nombre}</div>
                        <div style="font-size:12px; color:#94a3b8;">Fecha límite: ${c.fecha.replace(/-/g, '/')}</div>
                    </div>
                    <div class="status ${cl}">${st}</div>
                </div>
            `;
        });
    }
</script>
</body>
</html>
