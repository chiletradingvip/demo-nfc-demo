<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfil</title>
    <style>
        body { background-color: #0d1421; color: white; font-family: sans-serif; margin: 0; padding: 20px; font-size: 18px; }
        #bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1421; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        h1 { font-size: 32px; margin-bottom: 10px; }
        input { padding: 20px; border-radius: 10px; border: 1px solid #30405c; background: #1a2538; color: white; text-align: center; font-size: 28px; margin: 20px; width: 250px; }
        button { background-color: #3b82f6; color: white; border: none; padding: 20px 50px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        .session-banner { background-color: #064e3b; color: #10b981; padding: 15px; border-radius: 8px; text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 25px; }
        .profile { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .avatar { font-size: 60px; }
        .name { font-size: 26px; font-weight: bold; }
        .role { color: #5BA8DC; font-weight: bold; font-size: 18px; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .label { font-size: 13px; color: #6e84a3; text-transform: uppercase; }
        .val { font-size: 20px; margin-top: 5px; }
        .counters { display: flex; gap: 15px; margin-bottom: 30px; }
        .badge { padding: 10px 20px; border-radius: 6px; font-weight: bold; font-size: 16px; }
        
        .card { background-color: #1e293b; padding: 20px; margin-bottom: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #10b981; }
        .card.vencido { border-left-color: #b91c1c; }
        .card.por-vencer { border-left-color: #d97706; }
        .status { padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; background: #064e3b; color: #10b981; }
        .status.vencido { background: #7f1d1d; color: #ef4444; }
        .status.por-vencer { background: #78350f; color: #d97706; }
        
        .btn-cerrar { width: 100%; padding: 20px; border-radius: 10px; border: none; background: #f3f4f6; color: #374151; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>

<div id="bloqueo">
    <h1>Acceso Restringido</h1>
    <p>Ingrese clave de jefatura</p>
    <input type="password" id="pin" maxlength="4" placeholder="••••">
    <button onclick="validar()">Desbloquear Perfil</button>
</div>

<div id="contenido" style="display:none;">
    <div class="session-banner">Sesión activa: Jefatura validada (Expira en 30:00)</div>
    <div class="profile">
        <div class="avatar">👨‍🔧</div>
        <div>
            <div class="name">Daniel Ahumada</div>
            <div class="role">Op. Grúa Horquilla</div>
        </div>
    </div>
    <div class="grid-info">
        <div><div class="label">RUT</div><div class="val">12.345.678-9</div></div>
        <div><div class="label">N° SAP</div><div class="val">SAP-9844</div></div>
        <div><div class="label">ÁREA</div><div class="val">Fundición</div></div>
        <div><div class="label">ACTUALIZADO</div><div class="val">Hace 1 min</div></div>
    </div>
    <div class="label">COMPETENCIAS ASIGNADAS</div>
    <div class="counters">
        <div class="badge" style="background:#064e3b; color:#10b981;" id="vigentes">VIGENTES: 0</div>
        <div class="badge" style="background:#7f1d1d; color:#ef4444;" id="vencidos">VENCIDOS: 0</div>
    </div>
    <div id="lista-competencias"></div>
    <button class="btn-cerrar" onclick="location.reload()">Cerrar Perfil</button>
</div>

<script>
    const comps = [
        { nombre: "Examen Ocupacional", fecha: "2026-12-15" },
        { nombre: "Licencia Interna", fecha: "2025-05-20" },
        { nombre: "Trabajo en Altura", fecha: "2027-03-10" },
        { nombre: "Uso de Extintores", fecha: "2026-08-01" },
        { nombre: "Izaje / Rigger", fecha: "2025-09-12" }
    ];

    // Al cargar la página, verificamos si hay una sesión válida de 30 min
    window.onload = function() {
        const sesionGuardada = localStorage.getItem('sesionNFC');
        if (sesionGuardada) {
            const tiempoTranscurrido = (Date.now() - parseInt(sesionGuardada)) / 1000 / 60;
            if (tiempoTranscurrido < 30) {
                mostrarContenido();
            }
        }
    };

    function validar() {
        if(document.getElementById('pin').value === "1234") {
            // Guardamos el momento exacto en localStorage para que persista al cerrar el navegador
            localStorage.setItem('sesionNFC', Date.now());
            mostrarContenido();
        } else { alert("Clave incorrecta"); }
    }

    function mostrarContenido() {
        document.getElementById('bloqueo').style.display = 'none';
        document.getElementById('contenido').style.display = 'block';
        renderizar();
    }

    function renderizar() {
        const hoy = new Date(); hoy.setHours(0,0,0,0);
        let v = 0, venc = 0;
        let container = document.getElementById('lista-competencias');
        container.innerHTML = ""; // Limpiar antes de renderizar
        
        comps.forEach(c => {
            let f = new Date(c.fecha);
            let dias = Math.ceil((f - hoy) / (1000 * 60 * 60 * 24));
            
            let cl = "", st = "VIGENTE";
            if (dias < 0) { cl = "vencido"; st = "VENCIDO"; venc++; }
            else if (dias <= 30) { cl = "por-vencer"; st = "POR VENCER"; v++; }
            else { v++; }
            
            container.innerHTML += `
                <div class="card ${cl}">
                    <div>
                        <div style="font-weight:bold; font-size:17px;">${c.nombre}</div>
                        <div style="font-size:14px; color:#94a3b8; margin-top:5px;">Fecha límite: ${c.fecha.replace(/-/g, '/')}</div>
                    </div>
                    <div class="status ${cl}">${st}</div>
                </div>
            `;
        });
        document.getElementById('vigentes').innerText = "VIGENTES: " + v;
        document.getElementById('vencidos').innerText = "VENCIDOS: " + venc;
    }
</script>

</body>
</html>
